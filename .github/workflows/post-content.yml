name: Post TikTok Content

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Generate content and slides
        run: node generate-content.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          NICHE: ${{ vars.NICHE || 'cybersecurity careers' }}
          BRAND: ${{ vars.BRAND || 'cypherjobs.io' }}

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ schedules/
          git diff --cached --quiet || git commit -m "chore: generate slides $(date +%Y-%m-%d)"
          git push

      - name: Post to Buffer
        run: node batch-schedule.js
        env:
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
          BUFFER_CHANNEL_ID: ${{ secrets.BUFFER_CHANNEL_ID }}
          POST_NOW: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
